<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>

  <link rel="stylesheet" href="music.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Music Card -->
  <div class="player">

    <h1>🎧 Music Player</h1>

    <!-- Album -->
    <div class="album-container">

      <div class="glow-ring"></div>

      <img
        id="albumArt"
        src="https://static.vecteezy.com/system/resources/previews/037/044/052/non_2x/ai-generated-studio-shot-of-black-headphones-over-music-note-explosion-background-with-empty-space-for-text-photo.jpg"
        alt="album"
      >

      <!-- Wave Animation -->
      <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- Song -->
    <h2 id="songName">No Song Selected</h2>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="mainInput" placeholder="Search songs...">
      <button id="searchBtn">Search</button>
    </div>

    <!-- Upload -->
    <label class="upload-btn">
      Upload Song
      <input type="file" id="fileInput" accept="audio/*">
    </label>

    <!-- Audio -->
    <audio id="audioPlayer" controls></audio>

    <!-- Song Results -->
    <ul id="results"></ul>

  </div>

  <script src="music.js"></script>

</body>
</html>
